# ===================================================
# Course Page Generator — YAML Config 完整範例
# 可作為 global.yaml 或課程 config.yaml 的參考
# 課程 config 只需寫要覆蓋的欄位（deep merge）
# ===================================================

# ---------------------------------------------------
# 頁面基本設定
# ---------------------------------------------------
page:
  lang: zh-TW
  favicon: "https://deanlin.net/images/favicon.png"
  title: "AI 開發工作流 — 從新專案到自動化測試"
  badge: "CAKE 課程 · AI 開發工作流"
  # hero_title 支援 <br> 換行
  hero_title: "從新專案建立<br>到自動化測試"
  subtitle: "用 AI 走過完整的開發流程：規格驅動開發、版本控制 Skills 設計、自動化測試導入"

# ---------------------------------------------------
# 講者資訊
# ---------------------------------------------------
instructor:
  name: "林鼎淵 Dean Lin"
  tagline: "外商工程師 · 企業內訓講師 · 暢銷書作家"
  bio: >
    專注於 AI 開發工作流的實踐與推廣，協助企業導入 AI 輔助開發流程。<br>
    擅長將複雜的技術概念轉化為可落地的工作流程，讓團隊真正提升開發效率而非盲目追逐工具。
  # avatar 留空則使用 placeholder（👤 圖示）
  # 可省略副檔名，build 會自動偵測 jpg/jpeg/png/webp/gif/svg
  # 路徑相對於 config/ 的父目錄（即 global.yaml 所在的 config/ 之上一層）
  avatar: "config/assets/author"
  # stats：text 支援 **粗體** 等 inline markdown
  stats:
    - text: "📚 出版 **7** 本專業書籍"
      url: "https://www.tenlong.com.tw/products/9786264142083"
    - text: "🎤 超過 **100** 場講座"
      url: "https://www.youtube.com/@dlcorner"
    - text: "✍️ 發表超過 **400** 篇文章"
      url: "https://medium.com/@dean-lin"
  # 支援平台：Medium, Facebook, Threads, YouTube, GitHub, LinkedIn, Email
  socials:
    - platform: "Medium"
      url: "https://medium.com/@dean-lin"
    - platform: "Facebook"
      url: "https://www.facebook.com/deanlinbao"
    - platform: "Threads"
      url: "https://www.threads.com/@deanlin5288"
    - platform: "YouTube"
      url: "https://www.youtube.com/@dlcorner"
    - platform: "GitHub"
      url: "https://github.com/dean9703111"
    # - platform: "LinkedIn"
    #   url: "https://linkedin.com/in/..."
    # - platform: "Email"
    #   url: "mailto:example@example.com"

# ---------------------------------------------------
# 引言（opening 出現在講師介紹後、closing 出現在所有章節後）
# ---------------------------------------------------
quotes:
  opening:
    text: "工具會過時，框架會淘汰，<br>但解決問題的思維方式，永遠值錢。"
    # author: "某某人"  # 可選，不填則不顯示
  closing:
    text: >
      AI 正在讓程式碼快速貶值，<br>
      但市場永遠需要好產品。<br><br>
      不管 AI 多強大，<br>
      按下同意的那一刻，責任歸屬於你。
    # author: ""

# ---------------------------------------------------
# Hero 導覽按鈕
# 預設從 content.md 的 # 章節自動產生，不需手動維護
# 若需自訂按鈕文字，取消註解：
# ---------------------------------------------------
# nav:
#   - text: "自訂文字"
#     href: "#section-id"

# ---------------------------------------------------
# 頁尾
# ---------------------------------------------------
footer:
  cta: "歡迎追蹤我的社群，獲取更多 AI 開發實戰內容"
  copyright: "© 林鼎淵 Dean Lin"
  # show_socials: true 會在 footer 重複顯示社群連結
  show_socials: true

# ---------------------------------------------------
# SEO / Open Graph
# 重要：image 必須使用絕對 URL，社群平台無法解析相對路徑
# ---------------------------------------------------
seo:
  site_name: "林鼎淵 Dean Lin"
  type: "article"
  title: "AI 開發工作流｜Vibe Coding 實戰課"
  description: "從 0 到 1 打造 AI 開發工作流，讓規格、版本控制、測試都能被 AI 自動化協助。"
  image: "https://deanlin.net/course/cake/assets/og-image.jpg"
  url: "https://deanlin.net/course/cake/"
